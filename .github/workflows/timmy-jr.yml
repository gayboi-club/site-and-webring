name: timmy-jr

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: self-hosted

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install dependencies
              run: npm install --production

            - name: Start or reload PM2 processes
              run: pm2 startOrReload ecosystem.config.js --update-env
